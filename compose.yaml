---
services:
  hugo:
    image: hugomods/hugo:exts-non-root
    container_name: volley-hugo
    ports:
      - '1313:1313'
    volumes:
      - ./:/src
    command: server --bind 0.0.0.0 --baseURL=http://localhost/ --buildDrafts --buildFuture --enableGitInfo=true

  proxy:
    build:
      context: ./proxy-gitea
    ports:
      - '4000:4000'
    environment:
      - GITEA_TOKEN=${GITEA_TOKEN}
      - GITEA_API=${GITEA_API}
    restart: unless-stopped
