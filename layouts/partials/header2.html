<header
  class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom"
>
  <div class="col-md-3 mb-2 mb-md-0">
    <a href="/" class="navbar-brand d-inline-flex link-body-emphasis text-decoration-none">
      {{ with resources.Get "media/logo.svg" }}
        <img src="{{ .RelPermalink }}" width="90" height="90" alt="Logo VCN" />
      {{ end }}
      VCN
      {{ if eq (hugo.Environment) "development" -}}Pré-prod{{ end }}
    </a>
  </div>
  <button
    class="navbar-toggler"
    type="button"
    data-bs-toggle="collapse"
    data-bs-target="#navbar-vcn"
    aria-controls="navbar-vcn"
    aria-expanded="false"
    aria-label="Toggle navigation"
  >
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbar-vcn">
    <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0 text-uppercase">
      {{ partial "menu.html" . }}
    </ul>
    <div id="social-networks" class="col-md-3 text-end">
      {{ range $name, $v := .Site.Params.socials }}
        <!-- prettier-ignore -->
        <a class="social-network" href="{{ $v.url }}"><i class="fa-brands fa-{{ $v.icon }}"></i></a>
      {{ end }}
    </div>
  </div>
</header>
